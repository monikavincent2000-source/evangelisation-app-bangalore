<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.login-box{
background:white;
width:350px;
margin:auto;
margin-top:120px;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#00b7ff;
color:rgb(255, 255, 255);
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Evangelisation Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<br>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
